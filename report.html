<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الإعلام الحربي — التغطية الإخبارية</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="src/css/report.css"/>
<link rel="stylesheet" href="src/css/enhancements.css"/>
<link rel="stylesheet" href="src/css/navbar.css"/>
<link rel="stylesheet" href="src/css/spotlight.css"/>
<link rel="stylesheet" href="src/css/print.css" media="print"/>
</head>
<body>
<script>
  (function(){try{var s=localStorage.getItem('harbi-theme');var l=s!=='dark';document.documentElement.classList.toggle('light',l);var f=function(){document.body&&document.body.classList.toggle('light',l);};if(document.body)f();else document.addEventListener('DOMContentLoaded',f);}catch(e){}})();
</script>
<script type="module">
import { initNavbar } from './src/js/ui/navbar.js';
initNavbar();
</script>
<div id="report-root">
  <div class="header">
    <h1 style="position:relative">جارٍ التحميل...</h1>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="src/js/app.js?v=2.5.1"></script>
<script src="https://sql.js.org/dist/sql-wasm.js"></script>
<script type="module" src="src/js/search/spotlight.js"></script>
<script src="src/js/ui/disclaimer.js?v=2.5.1"></script>
<script type="module">
  import { mountPdfButton } from './src/js/export/pdf-button.js';
  // report.html starts with a loading placeholder; src/js/app.js replaces the
  // header once data loads. Wait for .header .date-row to appear before mounting.
  const reportRoot = document.getElementById('report-root');
  const observer = new MutationObserver((_, obs) => {
    const target = document.querySelector('.header .date-row');
    if (target && !document.querySelector('.download-btn-pdf')) {
      mountPdfButton('.header .date-row');
      obs.disconnect();
    }
  });
  observer.observe(reportRoot, { childList: true, subtree: true });
</script>
</body>
</html>
