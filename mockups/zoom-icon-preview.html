<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>Zoom icon preview</title>
<style>
  body { background:#0f0f10; color:#e8e3d3; font-family:'Noto Kufi Arabic',sans-serif; padding:40px; }
  .row { display:flex; gap:48px; justify-content:center; margin-top:40px; }
  .opt { text-align:center; }
  .box { width:72px; height:72px; border:1px dashed #3a3a3a; border-radius:10px;
         display:flex; align-items:center; justify-content:center; margin:0 auto 12px; }
  svg { width:32px; height:32px; fill:none; stroke:#c9a84c; stroke-width:1.6; }
  .opt:hover svg { stroke:#e8c766; }
  .num { font-size:14px; color:#c9a84c; margin-bottom:6px; }
  .lbl { font-size:12px; color:#9a9585; }
  h1 { text-align:center; font-size:16px; color:#c9a84c; font-weight:500; }
  .current { opacity:.5; }
</style>
</head>
<body>
  <h1>تكبير — اختر الأيقونة</h1>

  <div class="row">
    <div class="opt current">
      <div class="num">الحالية</div>
      <div class="box">
        <svg viewBox="0 0 24 24"><path d="M3 3h6M3 3v6M21 3h-6M21 3v6M3 21h6M3 21v-6M21 21h-6M21 21v-6"/></svg>
      </div>
      <div class="lbl">ECharts default</div>
    </div>

    <div class="opt">
      <div class="num">١</div>
      <div class="box">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16" y1="16" x2="21" y2="21"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="11" y1="8" x2="11" y2="14"/></svg>
      </div>
      <div class="lbl">عدسة + علامة زائد</div>
    </div>

    <div class="opt">
      <div class="num">٢</div>
      <div class="box">
        <svg viewBox="0 0 24 24"><path d="M3 9V3h6M21 9V3h-6M3 15v6h6M21 15v6h-6"/></svg>
      </div>
      <div class="lbl">إطار اختيار</div>
    </div>

    <div class="opt">
      <div class="num">٣</div>
      <div class="box">
        <svg viewBox="0 0 24 24"><circle cx="10" cy="10" r="7"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
      </div>
      <div class="lbl">عدسة بسيطة</div>
    </div>
  </div>
</body>
</html>
